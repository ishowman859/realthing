<!doctype html>
<html lang="ko">
  <head>
    <meta name="verity-default-api" content="http://98.84.127.220:4000" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verity Admin</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">Verity Admin</h1>
      <p class="sub">관리자 토큰으로 최근 등록 데이터와 배치 상태를 조회합니다.</p>

      <section class="card">
        <div class="row">
          <input
            id="apiBase"
            class="input mono"
            placeholder="API Base URL (로컬: http://localhost:4000 / Pages: ?api= 또는 여기에 https://백엔드)"
          />
          <input
            id="adminToken"
            class="input mono"
            type="password"
            placeholder="ADMIN_TOKEN"
          />
          <button id="loadButton" class="btn">불러오기</button>
          <button id="saveButton" class="btn secondary">토큰 저장</button>
        </div>
        <div id="statusText" class="status">대기 중</div>
      </section>

      <section class="card">
        <h3>Admin Health</h3>
        <div id="healthText" class="status">-</div>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <h3>Solana Anchor Settings</h3>
            <p class="section-sub">
              머클 루트 앵커링용 RPC와 전용 지갑 키를 저장합니다. 개인키는 다시 표시하지 않고 공개키와 상태만 보여줍니다.
            </p>
          </div>
          <button id="saveSolanaButton" class="btn">Solana 저장</button>
        </div>

        <div class="grid two">
          <label class="field">
            <span>RPC URL</span>
            <input id="solanaRpcUrl" class="input mono" placeholder="https://api.devnet.solana.com" />
          </label>
          <label class="field">
            <span>Cluster</span>
            <select id="solanaCluster" class="input mono">
              <option value="">자동 감지</option>
              <option value="devnet">devnet</option>
              <option value="mainnet-beta">mainnet-beta</option>
              <option value="testnet">testnet</option>
            </select>
          </label>
          <label class="field">
            <span>Commitment</span>
            <select id="solanaCommitment" class="input mono">
              <option value="confirmed">confirmed</option>
              <option value="processed">processed</option>
              <option value="finalized">finalized</option>
            </select>
          </label>
          <label class="field check">
            <input id="solanaAnchorDisabled" type="checkbox" />
            <span>온체인 앵커링 일시 중지</span>
          </label>
        </div>

        <label class="field">
          <span>Solana Private Key</span>
          <textarea
            id="solanaKeypair"
            class="input mono textarea"
            placeholder="base58 비밀키 또는 [12,34,...] 64바이트 배열"
          ></textarea>
        </label>

        <div id="solanaStatusText" class="status">-</div>
        <dl id="solanaFacts" class="facts"></dl>
      </section>

      <section class="card">
        <h3>최근 자산</h3>
        <table>
          <thead>
            <tr>
              <th>생성시각</th>
              <th>시리얼</th>
              <th>오너</th>
              <th>모드</th>
              <th>미디어</th>
              <th>AI점수</th>
              <th>중복점수</th>
            </tr>
          </thead>
          <tbody id="assetsBody"></tbody>
        </table>
      </section>

      <section class="card">
        <h3>최근 분단위 배치</h3>
        <table>
          <thead>
            <tr>
              <th>minuteBucket</th>
              <th>segment</th>
              <th>status</th>
              <th>itemCount</th>
              <th>blockNumber</th>
              <th>sentAt</th>
            </tr>
          </thead>
          <tbody id="batchesBody"></tbody>
        </table>
      </section>
    </main>

    <script src="admin.js" defer></script>
  </body>
</html>
