<!doctype html>
<html lang="ko">
  <head>
    <meta name="verity-default-api" content="" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verity Admin</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">Verity Admin</h1>
      <p class="sub">관리자 토큰으로 최근 등록 데이터와 배치 상태를 조회합니다.</p>

      <section class="card">
        <div class="row">
          <input
            id="apiBase"
            class="input mono"
            placeholder="API Base URL (로컬: http://localhost:4000 / Pages: ?api= 또는 여기에 https://백엔드)"
          />
          <input
            id="adminToken"
            class="input mono"
            type="password"
            placeholder="ADMIN_TOKEN"
          />
          <button id="loadButton" class="btn">불러오기</button>
          <button id="saveButton" class="btn secondary">토큰 저장</button>
        </div>
        <div id="statusText" class="status">대기 중</div>
      </section>

      <section class="card">
        <h3>Admin Health</h3>
        <div id="healthText" class="status">-</div>
      </section>

      <section class="card">
        <h3>최근 자산</h3>
        <table>
          <thead>
            <tr>
              <th>생성시각</th>
              <th>시리얼</th>
              <th>오너</th>
              <th>모드</th>
              <th>미디어</th>
              <th>AI점수</th>
              <th>중복점수</th>
            </tr>
          </thead>
          <tbody id="assetsBody"></tbody>
        </table>
      </section>

      <section class="card">
        <h3>최근 분단위 배치</h3>
        <table>
          <thead>
            <tr>
              <th>minuteBucket</th>
              <th>segment</th>
              <th>status</th>
              <th>itemCount</th>
              <th>blockNumber</th>
              <th>sentAt</th>
            </tr>
          </thead>
          <tbody id="batchesBody"></tbody>
        </table>
      </section>
    </main>

    <script src="admin.js" defer></script>
  </body>
</html>
