upstream pht_rpc {
    server validator:8899;
}

upstream pht_ws {
    server validator:8900;
}

server {
    listen 80;
    server_name rpc.verity.io;

    # JSON-RPC endpoint
    location / {
        proxy_pass http://pht_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Rate limiting
        limit_req zone=rpc_limit burst=50 nodelay;
    }

    # WebSocket endpoint
    location /ws {
        proxy_pass http://pht_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Health check
    location /health {
        proxy_pass http://pht_rpc;
        proxy_method POST;
        proxy_set_header Content-Type "application/json";
        proxy_set_body '{"jsonrpc":"2.0","id":1,"method":"getHealth"}';
    }
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=rpc_limit:10m rate=30r/s;
